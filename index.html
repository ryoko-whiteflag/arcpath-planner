// ===============================================
// Event handlers — MODELESS
// ===============================================

function setupEvents() {

  // ── Mouse events ──
  canvasWrap.addEventListener('mousedown', (e) => {
    if (e.target.closest('#mobile-drawer')) return;
    hideContextMenu();
    // Silently reset leaked state from previous interaction
    if (state.extending || state.dragging) {
      resetInteractionState();
    }

    // Middle-click or alt+click = pan
    if (e.button === 1 || (e.button === 0 && e.altKey)) {
      state.panning = true;
      state.panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
      canvasWrap.style.cursor = 'grabbing';
      e.preventDefault();
      return;
    }
    if (e.button !== 0) return;

    const world = screenToWorld(e.clientX, e.clientY);

    // Priority 1: endpoint handle
    const endpoint = hitTestEndpoint(world.x, world.y);
    if (endpoint) {
      state.extending = {
        pieceId: endpoint.pieceId,
        connIdx: endpoint.connIdx,
        lastPlacedId: null,
        lastPlacedConn: null,
      };
      state.extendChain = [];
      e.preventDefault();
      return;
    }

    // Priority 2: piece body → select + drag
    const piece = hitTest(world.x, world.y);
    if (piece) {
      pushUndo();
      selectPiece(piece.id);
      disconnectPiece(piece);
      state.dragging = {
        id: piece.id,
        offsetX: piece.x - world.x,
        offsetY: piece.y - world.y,
      };
      e.preventDefault();
      return;
    }

    // Priority 3: empty space → pan (click detection on mouseup for placement)
    selectPiece(null);
    state.panning = true;
    state.panStart = { x: e.clientX - state.panX, y: e.clientY - state.panY };
    state._clickStart = { x: e.clientX, y: e.clientY };
    canvasWrap.style.cursor = 'grabbing';
  });

  canvasWrap.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const world = screenToWorld(e.clientX, e.clientY);
    const piece = hitTest(world.x, world.y);
    if (piece) {
      selectPiece(piece.id);
      showContextMenu(e.clientX, e.clientY);
    }
  });

  window.addEventListener('mousemove', (e) => {
    try {
      // Extending
      if (state.extending) {
        const world = screenToWorld(e.clientX, e.clientY);
        handleExtendMove(world.x, world.y);
        return;
      }

      // Panning
      if (state.panning) {
        state.panX = e.clientX - state.panStart.x;
        state.panY = e.clientY - state.panStart.y;
        updateView();
        return;
      }

      // Dragging piece
      if (state.dragging) {
        const piece = state.pieces.find(p => p.id === state.dragging.id);
        if (!piece) { state.dragging = null; return; }
        const world = screenToWorld(e.clientX, e.clientY);
        piece.x = world.x + state.dragging.offsetX;
        piece.y = world.y + state.dragging.offsetY;
        const g = svgEl.querySelector(`[data-id="${piece.id}"]`);
        if (g) updatePieceTransform(g, piece);
        drawEndpointHandles();
        showSnapIndicator(state.snapEnabled ? findSnapTarget(piece) : null);
      }
    } catch (err) {
      showError('mousemove: ' + err.message);
      showDebug('state: ext=' + !!state.extending + ' drag=' + !!state.dragging + ' pan=' + state.panning);
      state.extending = null;
      state.dragging = null;
      state.panning = false;
    }
  });

  window.addEventListener('mouseup', (e) => {
    try {
    if (state.extending) {
      // If user clicked endpoint without dragging, place one piece
      if (state.extendChain.length === 0) {
        const src = state.pieces.find(p => p.id === state.extending.pieceId);
        if (src) {
          const conns = getWorldConnectors(src);
          const c = conns[state.extending.connIdx];
          if (c) {
            const fwdRad = c.angle * Math.PI / 180;
            const newPiece = extendFromEndpoint(
              state.extending.pieceId, state.extending.connIdx,
              c.x + Math.cos(fwdRad) * 30, c.y + Math.sin(fwdRad) * 30
            );
            if (newPiece) selectPiece(newPiece.id);
          }
        }
      }
      state.extending = null;
      state.extendChain = [];
      drawEndpointHandles();
      return;
    }

    if (state.panning) {
      state.panning = false;
      canvasWrap.style.cursor = '';
      if (state._clickStart) {
        const dx = e.clientX - state._clickStart.x;
        const dy = e.clientY - state._clickStart.y;
        if (Math.sqrt(dx * dx + dy * dy) < 5 && state.selectedCatalogIndex != null) {
          pushUndo();
          const world = screenToWorld(e.clientX, e.clientY);
          const piece = addPiece(state.selectedCatalogIndex, world.x, world.y);
          if (piece) {
            if (state.snapEnabled) {
              const snap = findSnapTarget(piece);
              if (snap) { snapPiece(piece, snap); refreshPieceSVG(piece); }
            }
            selectPiece(piece.id);
            drawEndpointHandles();
          }
        }
        state._clickStart = null;
      }
      return;
    }

    if (state.dragging) {
      const piece = state.pieces.find(p => p.id === state.dragging.id);
      if (piece && state.snapEnabled) {
        const snap = findSnapTarget(piece);
        if (snap) { snapPiece(piece, snap); refreshPieceSVG(piece); }
      }
      hideSnapIndicator();
      state.dragging = null;
      drawEndpointHandles();
    }
    } catch (err) {
      showError('mouseup: ' + err.message);
      showDebug('state: ext=' + !!state.extending + ' drag=' + !!state.dragging + ' pan=' + state.panning);
    } finally {
      // ALWAYS reset interaction state to prevent permanent lockup
      state.extending = null;
      state.extendChain = [];
      state.dragging = null;
      state.panning = false;
      state._clickStart = null;
      canvasWrap.style.cursor = '';
    }
  });

  canvasWrap.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvasWrap.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const oldZoom = state.zoom;
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    state.zoom = Math.min(3, Math.max(0.1, state.zoom * delta));
    state.panX = mx - (mx - state.panX) * (state.zoom / oldZoom);
    state.panY = my - (my - state.panY) * (state.zoom / oldZoom);
    updateView();
  }, { passive: false });

  // ── Touch events ──
  const DRAG_THRESHOLD = 10;
  let touchStartPos = null;
  let touchStartPiece = null;
  let touchStartEndpoint = null;
  let touchCommitted = false;
  let activeTouches = {};

  // Helper: reset ALL interaction state (emergency recovery)
  function resetInteractionState() {
    state.extending = null; state.extendChain = [];
    state.dragging = null; state.panning = false;
    state._clickStart = null; state.lastPinchDist = null;
    state.pinchCenter = null;
    canvasWrap.style.cursor = '';
    clearLongPress();
    touchStartPos = null; touchStartPiece = null;
    touchStartEndpoint = null; touchCommitted = false;
    activeTouches = {};
    dragGhost.style.display = 'none';
  }

  canvasWrap.addEventListener('touchstart', (e) => {
    if (e.target.closest('#mobile-drawer')) return;
    if (e.target.closest('#fab-add')) return;
    e.preventDefault();
    try {
      // Silently reset leaked state from previous interaction
      if (state.extending || state.dragging) {
        resetInteractionState();
      }
      // Reset activeTouches from reality, then add new touches
      activeTouches = {};
      for (const t of e.touches) {
        activeTouches[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      const touchCount = e.touches.length;

      if (touchCount === 2) {
        clearLongPress();
        touchCommitted = true;
        state.dragging = null;
        state.extending = null;
        const pts = Object.values(activeTouches);
        state.lastPinchDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        state.pinchCenter = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        state.panning = true;
        state.panStart = { x: state.pinchCenter.x - state.panX, y: state.pinchCenter.y - state.panY };
        return;
      }

      if (touchCount === 1) {
        const t = e.touches[0];
        touchStartPos = { x: t.clientX, y: t.clientY };
        state.touchStartTime = Date.now();
        state.touchMoved = false;
        touchCommitted = false;

        const world = screenToWorld(t.clientX, t.clientY);
        touchStartEndpoint = hitTestEndpoint(world.x, world.y);
        touchStartPiece = touchStartEndpoint ? null : hitTest(world.x, world.y);

        state.longPressTimer = setTimeout(() => {
          if (!state.touchMoved && touchStartPiece) {
            touchCommitted = true;
            selectPiece(touchStartPiece.id);
            showContextMenu(t.clientX, t.clientY);
          }
        }, 500);
      }
    } catch (err) {
      showError('touchstart: ' + err.message + ' | stack: ' + (err.stack||'').split('\n')[1]);
      showDebug('state: ext=' + !!state.extending + ' drag=' + !!state.dragging + ' pan=' + state.panning + ' pieces=' + state.pieces.length);
      resetInteractionState();
    }
  }, { passive: false });

  window.addEventListener('touchmove', (e) => {
    try {
      // Update activeTouches from actual touches
      activeTouches = {};
      for (const t of e.touches) {
        activeTouches[t.identifier] = { x: t.clientX, y: t.clientY };
      }
      const touchCount = e.touches.length;

      if (touchCount === 2) {
        e.preventDefault();
        const pts = Object.values(activeTouches);
        const newDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
        const newCenter = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
        if (state.lastPinchDist) {
          const scale = newDist / state.lastPinchDist;
          const oldZoom = state.zoom;
          const rect = canvasWrap.getBoundingClientRect();
          const mx = newCenter.x - rect.left;
          const my = newCenter.y - rect.top;
          state.zoom = Math.min(3, Math.max(0.1, state.zoom * scale));
          state.panX = mx - (mx - state.panX) * (state.zoom / oldZoom);
          state.panY = my - (my - state.panY) * (state.zoom / oldZoom);
          if (state.pinchCenter) {
            state.panX += newCenter.x - state.pinchCenter.x;
            state.panY += newCenter.y - state.pinchCenter.y;
          }
          state.pinchCenter = newCenter;
          updateView();
        }
        state.lastPinchDist = newDist;
        return;
      }

      if (e.touches.length === 1) {
        const t = e.touches[0];
        if (!touchStartPos) return;
        const dx = t.clientX - touchStartPos.x;
        const dy = t.clientY - touchStartPos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > DRAG_THRESHOLD && !touchCommitted) {
          state.touchMoved = true;
          touchCommitted = true;
          clearLongPress();

          if (touchStartEndpoint) {
            state.extending = {
              pieceId: touchStartEndpoint.pieceId,
              connIdx: touchStartEndpoint.connIdx,
              lastPlacedId: null,
              lastPlacedConn: null,
            };
            state.extendChain = [];
          } else if (touchStartPiece) {
            pushUndo();
            selectPiece(touchStartPiece.id);
            disconnectPiece(touchStartPiece);
            const world = screenToWorld(touchStartPos.x, touchStartPos.y);
            state.dragging = {
              id: touchStartPiece.id,
              offsetX: touchStartPiece.x - world.x,
              offsetY: touchStartPiece.y - world.y,
            };
          } else {
            state.panning = true;
            state.panStart = { x: touchStartPos.x - state.panX, y: touchStartPos.y - state.panY };
          }
        }

        if (dist > DRAG_THRESHOLD) { state.touchMoved = true; clearLongPress(); }

        if (touchCommitted) {
          e.preventDefault();
          if (state.extending) {
            const world = screenToWorld(t.clientX, t.clientY);
            handleExtendMove(world.x, world.y);
          } else if (state.dragging) {
            const piece = state.pieces.find(p => p.id === state.dragging.id);
            if (piece) {
              const world = screenToWorld(t.clientX, t.clientY);
              piece.x = world.x + state.dragging.offsetX;
              piece.y = world.y + state.dragging.offsetY;
              const g = svgEl.querySelector(`[data-id="${piece.id}"]`);
              if (g) updatePieceTransform(g, piece);
              drawEndpointHandles();
            }
          } else if (state.panning) {
            state.panX = t.clientX - state.panStart.x;
            state.panY = t.clientY - state.panStart.y;
            updateView();
          }
        }
      }
    } catch (err) {
      showError('touchmove: ' + err.message + ' | stack: ' + (err.stack||'').split('\n')[1]);
      showDebug('state: ext=' + !!state.extending + ' drag=' + !!state.dragging + ' pan=' + state.panning + ' pieces=' + state.pieces.length);
      resetInteractionState();
    }
  }, { passive: false });

  window.addEventListener('touchend', (e) => {
    const touchCount = e.touches.length;
    // Sync activeTouches with reality
    activeTouches = {};
    for (const t of e.touches) activeTouches[t.identifier] = { x: t.clientX, y: t.clientY };

    try {
      const endTouch = e.changedTouches[0];
      if (touchCount < 2) { state.lastPinchDist = null; state.pinchCenter = null; }
      clearLongPress();

      if (state.extending && touchCount === 0) {
        state.extending = null;
        state.extendChain = [];
        drawEndpointHandles();
      }
      if (state.dragging && touchCount === 0) {
        const piece = state.pieces.find(p => p.id === state.dragging.id);
        if (piece && state.snapEnabled) {
          const snap = findSnapTarget(piece);
          if (snap) { snapPiece(piece, snap); refreshPieceSVG(piece); }
        }
        state.dragging = null;
        drawEndpointHandles();
      }
      if (state.panning && touchCount === 0) state.panning = false;

      // Tap detection
      if (!state.touchMoved && touchCount === 0 && !touchCommitted) {
        const elapsed = Date.now() - state.touchStartTime;
        if (elapsed < 400) {
          if (touchStartEndpoint) {
            const ep = touchStartEndpoint;
            const sourcePiece = state.pieces.find(p => p.id === ep.pieceId);
            if (sourcePiece) {
              const conns = getWorldConnectors(sourcePiece);
              const c = conns[ep.connIdx];
              if (c) {
                const fwdRad = c.angle * Math.PI / 180;
                const newPiece = extendFromEndpoint(ep.pieceId, ep.connIdx,
                  c.x + Math.cos(fwdRad) * 30, c.y + Math.sin(fwdRad) * 30);
                if (newPiece) selectPiece(newPiece.id);
              }
            }
          } else if (touchStartPiece) {
            selectPiece(touchStartPiece.id);
          } else {
            if (state.selectedCatalogIndex != null) {
              pushUndo();
              const world = screenToWorld(endTouch.clientX, endTouch.clientY);
              const piece = addPiece(state.selectedCatalogIndex, world.x, world.y);
              if (piece) {
                if (state.snapEnabled) {
                  const snap = findSnapTarget(piece);
                  if (snap) { snapPiece(piece, snap); refreshPieceSVG(piece); }
                }
                selectPiece(piece.id);
                drawEndpointHandles();
              }
            } else {
              selectPiece(null);
            }
          }
        }
      }
    } catch (err) {
      showError('touchend: ' + err.message + ' | stack: ' + (err.stack||'').split('\n')[1]);
      showDebug('state: ext=' + !!state.extending + ' drag=' + !!state.dragging + ' pan=' + state.panning + ' pieces=' + state.pieces.length);
    } finally {
      // ALWAYS reset on last finger up
      if (touchCount === 0) {
        state.extending = null;
        state.extendChain = [];
        state.dragging = null;
        state.panning = false;
      }
      touchStartPos = null;
      touchStartPiece = null;
      touchStartEndpoint = null;
      touchCommitted = false;
    }
  });

  window.addEventListener('touchcancel', () => {
    activeTouches = {};
    state.lastPinchDist = null;
    state.pinchCenter = null;
    clearLongPress();
    state.dragging = null;
    state.panning = false;
    state.extending = null;
    state.extendChain = [];
    touchStartPos = null;
    touchStartPiece = null;
    touchStartEndpoint = null;
    touchCommitted = false;
    dragGhost.style.display = 'none';
  });

  function clearLongPress() {
    if (state.longPressTimer) { clearTimeout(state.longPressTimer); state.longPressTimer = null; }
  }

  // ── Keyboard ──
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'Escape') {
      // Full state reset
      state.extending = null; state.extendChain = [];
      state.dragging = null; state.panning = false;
      state._clickStart = null; canvasWrap.style.cursor = '';
      selectPiece(null); hideContextMenu(); drawEndpointHandles();
      return;
    }
    if (e.ctrlKey && (e.key === 'z' || e.key === 'Z') && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if (e.ctrlKey && (e.key === 'z' || e.key === 'Z') && e.shiftKey) { e.preventDefault(); redo(); return; }
    if (e.ctrlKey && (e.key === 'y' || e.key === 'Y')) { e.preventDefault(); redo(); return; }
    if (e.key === 'r' || e.key === 'R') { rotatePiece(e.shiftKey ? 5.625 : 11.25); return; }
    if (e.key === 'f' || e.key === 'F') { flipPiece(); return; }
    if ((e.key === 'Delete' || e.key === 'Backspace') && state.selected) { removePiece(state.selected); return; }
    if (e.ctrlKey && (e.key === 'd' || e.key === 'D')) { e.preventDefault(); duplicateSelected(); return; }
  });

  // ── Toolbar buttons ──
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-rotate').addEventListener('click', () => rotatePiece(11.25));
  document.getElementById('btn-flip').addEventListener('click', flipPiece);
  document.getElementById('btn-delete').addEventListener('click', () => { if (state.selected) removePiece(state.selected); });
  document.getElementById('btn-snap').addEventListener('click', (e) => {
    state.snapEnabled = !state.snapEnabled;
    e.currentTarget.classList.toggle('active', state.snapEnabled);
  });
  document.getElementById('btn-grid').addEventListener('click', (e) => {
    state.gridEnabled = !state.gridEnabled;
    e.currentTarget.classList.toggle('active', state.gridEnabled);
    drawGrid();
  });
  document.getElementById('btn-zoom-in').addEventListener('click', () => { state.zoom = Math.min(3, state.zoom * 1.2); updateView(); });
  document.getElementById('btn-zoom-out').addEventListener('click', () => { state.zoom = Math.max(0.1, state.zoom / 1.2); updateView(); });
  document.getElementById('btn-clear').addEventListener('click', () => {
    if (state.pieces.length === 0 || confirm('レイアウトをクリアしますか?')) {
      state.pieces = [];
      state.selected = null;
      state.nextId = 1;
      svgEl.querySelector('#pieces-layer').innerHTML = '';
      drawEndpointHandles();
    }
  });
  document.getElementById('btn-parts').addEventListener('click', showPartsList);
  document.getElementById('btn-export').addEventListener('click', exportPNG);
  document.getElementById('btn-save').addEventListener('click', saveLayout);
  document.getElementById('btn-load').addEventListener('click', loadLayout);

  // FAB button
  document.getElementById('fab-add').addEventListener('click', () => {
    mobileDrawer.classList.toggle('collapsed');
    state.mobileDrawerExpanded = !mobileDrawer.classList.contains('collapsed');
  });

  // Context menu
  document.getElementById('ctx-menu').addEventListener('click', (e) => {
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (!action) return;
    hideContextMenu();
    if (!state.selected) return;
    switch (action) {
      case 'rotate': rotatePiece(11.25); break;
      case 'rotate-fine': rotatePiece(5.625); break;
      case 'rotate-90': rotatePiece(90); break;
      case 'flip': flipPiece(); break;
      case 'duplicate': duplicateSelected(); break;
      case 'delete': removePiece(state.selected); break;
    }
  });
  document.addEventListener('click', (e) => { if (!e.target.closest('#ctx-menu')) hideContextMenu(); });

  window.addEventListener('resize', resizeCanvas);
}

// ── Extend move handler (continuous placement) ──
function handleExtendMove(worldX, worldY) {
  if (!state.extending) return;

  // Determine current source
  let sourceId, sourceConn;
  if (state.extending.lastPlacedId) {
    sourceId = state.extending.lastPlacedId;
    sourceConn = state.extending.lastPlacedConn;
  } else {
    sourceId = state.extending.pieceId;
    sourceConn = state.extending.connIdx;
  }

  const sourcePiece = state.pieces.find(p => p.id === sourceId);
  if (!sourcePiece) { console.warn('extend: source piece not found', sourceId); return; }
  if (sourcePiece.connections.some(c => c.connIdx === sourceConn)) {
    console.warn('extend: source conn already connected', sourceId, sourceConn, sourcePiece.connections);
    return;
  }

  const conns = getWorldConnectors(sourcePiece);
  const outConn = conns[sourceConn];
  if (!outConn) { console.warn('extend: no outConn at index', sourceConn); return; }

  // Distance from current output to finger
  const dx = worldX - outConn.x;
  const dy = worldY - outConn.y;
  const dist = Math.sqrt(dx * dx + dy * dy);

  // Threshold: visual piece length * 0.7, min 25px screen-space
  const def = CATALOG[state.selectedCatalogIndex];
  if (!def || def.type === 'accessory') return;
  let threshold;
  if (def.type === 'straight') {
    threshold = getVisualStraightLength(def.length) * 0.7;
  } else {
    const R = getVisualCurveRadius(def.radius || 730);
    const theta = def.angle * Math.PI / 180;
    threshold = 2 * R * Math.sin(theta / 2) * 0.7;
  }
  // Minimum threshold in screen-space: 25px on screen
  const minWorldThreshold = 25 / state.zoom;
  threshold = Math.max(minWorldThreshold, threshold);

  if (dist >= threshold) {
    const newPiece = extendFromEndpoint(sourceId, sourceConn, worldX, worldY);
    if (newPiece) {
      state.extendChain.push(newPiece.id);
      state.extending.lastPlacedId = newPiece.id;
      state.extending.lastPlacedConn = 1; // Continue from exit
      console.log('extend: placed piece', newPiece.id, 'chain length:', state.extendChain.length);
    } else {
      console.warn('extend: extendFromEndpoint returned null');
    }
  }
}

// ── Snap indicator ──
function showSnapIndicator(snap) {
  let indicator = svgEl.querySelector('#snap-indicator');
  if (!indicator) {
    indicator = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    indicator.id = 'snap-indicator';
    indicator.setAttribute('r', '8');
    indicator.setAttribute('fill', 'none');
    indicator.setAttribute('stroke', '#ed8f57');
    indicator.setAttribute('stroke-width', '2');
    indicator.setAttribute('stroke-dasharray', '4,2');
    svgEl.querySelector('#overlay-layer').appendChild(indicator);
  }
  if (snap) {
    const otherConns = getWorldConnectors(snap.otherPiece);
    const target = otherConns[snap.otherConn];
    indicator.setAttribute('cx', target.x);
    indicator.setAttribute('cy', target.y);
    indicator.setAttribute('display', '');
  } else {
    indicator.setAttribute('display', 'none');
  }
}

function hideSnapIndicator() {
  const indicator = svgEl.querySelector('#snap-indicator');
  if (indicator) indicator.setAttribute('display', 'none');
}

// ── Piece operations ──
function rotatePiece(deg) {
  const piece = state.pieces.find(p => p.id === state.selected);
  if (!piece) return;
  pushUndo();
  disconnectPiece(piece);
  piece.rotation = ((piece.rotation + deg) % 360 + 360) % 360;
  refreshPieceSVG(piece);
  drawEndpointHandles();
  if (state.snapEnabled) {
    const snap = findSnapTarget(piece);
    if (snap) { snapPiece(piece, snap); refreshPieceSVG(piece); drawEndpointHandles(); }
  }
}

function flipPiece() {
  const piece = state.pieces.find(p => p.id === state.selected);
  if (!piece) return;
  pushUndo();
  disconnectPiece(piece);
  piece.flip = !piece.flip;
  refreshPieceSVG(piece);
  drawEndpointHandles();
}

function duplicateSelected() {
  const piece = state.pieces.find(p => p.id === state.selected);
  if (!piece) return;
  pushUndo();
  const newP = addPiece(piece.catIndex, piece.x + 30, piece.y + 30);
  if (newP) {
    newP.rotation = piece.rotation;
    newP.flip = piece.flip;
    refreshPieceSVG(newP);
    selectPiece(newP.id);
  }
}

function showContextMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top = Math.min(y, window.innerHeight - 260) + 'px';
}

function hideContextMenu() {
  document.getElementById('ctx-menu').style.display = 'none';
}

// ===============================================
// Parts list
// ===============================================

function showPartsList() {
  const counts = {};
  for (const piece of state.pieces) {
    const sku = piece.def.sku;
    counts[sku] = (counts[sku] || 0) + 1;
  }
  if (Object.keys(counts).length === 0) { alert('レイアウトにパーツがありません'); return; }

  let html = '<table><thead><tr><th>メーカー</th><th>品名</th><th>種別</th><th>数量</th><th>単価</th><th>小計</th></tr></thead><tbody>';
  let total = 0;
  for (const [sku, qty] of Object.entries(counts)) {
    const def = CATALOG.find(c => c.sku === sku);
    if (!def) continue;
    const subtotal = def.price * qty;
    if (def.brand === 'ArcPath') total += subtotal;
    // Track variant label
    let variant = '';
    if (def.variant === 'slab') variant = 'スラブ';
    else if (def.variant === 'ladder') variant = 'FL';
    else if (def.brand === 'KATO' && def.name && def.name.includes('PC')) variant = 'PC';
    else if (def.brand === 'KATO') variant = 'バラスト';
    if (def.level === 'elevated') variant += variant ? '/高架' : '高架';
    if (def.double) variant += variant ? '/複線' : '複線';
    const priceCell = def.brand === 'ArcPath' ? `&yen;${def.price.toLocaleString()}` : '-';
    const subtotalCell = def.brand === 'ArcPath' ? `&yen;${subtotal.toLocaleString()}` : '-';
    html += `<tr><td style="font-size:11px;font-weight:700">${def.brand || ''}</td><td>${def.name}</td><td style="font-size:11px;color:#666">${variant}</td><td>${qty}</td><td>${priceCell}</td><td>${subtotalCell}</td></tr>`;
  }
  html += `<tr class="total-row"><td colspan="5">合計（ArcPath）</td><td>&yen;${total.toLocaleString()}</td></tr>`;
  html += '</tbody></table>';
  html += `<p style="margin-top:12px;font-size:12px;color:#888">※ 橋脚は別途必要です（高架パーツ使用時）</p>`;
  document.getElementById('parts-content').innerHTML = html;
  document.getElementById('parts-modal').classList.add('show');
}

// ===============================================
// Export PNG
// ===============================================

function exportPNG() {
  if (state.pieces.length === 0) { alert('レイアウトにパーツがありません'); return; }

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const piece of state.pieces) {
    const conns = getWorldConnectors(piece);
    for (const c of conns) {
      minX = Math.min(minX, c.x); minY = Math.min(minY, c.y);
      maxX = Math.max(maxX, c.x); maxY = Math.max(maxY, c.y);
    }
    const bbox = getBBox(piece);
    const rad = piece.rotation * Math.PI / 180;
    const corners = [
      [bbox.x, bbox.y], [bbox.x + bbox.w, bbox.y],
      [bbox.x, bbox.y + bbox.h], [bbox.x + bbox.w, bbox.y + bbox.h]
    ];
    for (const [lx, ly] of corners) {
      const flipLy = piece.flip ? -ly : ly;
      const wx = piece.x + lx * Math.cos(rad) - flipLy * Math.sin(rad);
      const wy = piece.y + lx * Math.sin(rad) + flipLy * Math.cos(rad);
      minX = Math.min(minX, wx); minY = Math.min(minY, wy);
      maxX = Math.max(maxX, wx); maxY = Math.max(maxY, wy);
    }
  }

  const pad = 60;
  const partsHeight = 200;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const w = maxX - minX;
  const h = maxY - minY + partsHeight;

  const deselected = state.selected;
  selectPiece(null);

  const exportSvg = svgEl.cloneNode(false);
  exportSvg.setAttribute('width', w);
  exportSvg.setAttribute('height', h);
  exportSvg.setAttribute('viewBox', `${minX} ${minY} ${w} ${h}`);
  exportSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('x', minX); bg.setAttribute('y', minY);
  bg.setAttribute('width', w); bg.setAttribute('height', h);
  bg.setAttribute('fill', '#fff');
  exportSvg.appendChild(bg);

  const piecesLayer = svgEl.querySelector('#pieces-layer');
  if (piecesLayer) exportSvg.appendChild(piecesLayer.cloneNode(true));

  // Parts list in export
  const partsY = maxY + 10;
  const counts = {};
  for (const piece of state.pieces) counts[piece.def.sku] = (counts[piece.def.sku] || 0) + 1;
  let ty = partsY + 20;

  const titleText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  titleText.setAttribute('x', minX + 20); titleText.setAttribute('y', ty);
  titleText.setAttribute('font-family', 'Lato, Noto Sans JP, sans-serif');
  titleText.setAttribute('font-size', '16'); titleText.setAttribute('font-weight', '700');
  titleText.setAttribute('fill', '#4a545f');
  titleText.textContent = 'ArcPath パーツリスト';
  exportSvg.appendChild(titleText);
  ty += 24;

  let total = 0;
  for (const [sku, qty] of Object.entries(counts)) {
    const def = CATALOG.find(c => c.sku === sku);
    if (!def) continue;
    const subtotal = def.price * qty;
    total += subtotal;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', minX + 20); t.setAttribute('y', ty);
    t.setAttribute('font-family', 'Lato, Noto Sans JP, sans-serif');
    t.setAttribute('font-size', '12'); t.setAttribute('fill', '#4a545f');
    t.textContent = `${def.name}  x${qty}  \u00A5${subtotal.toLocaleString()}`;
    exportSvg.appendChild(t);
    ty += 18;
  }

  const totalText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  totalText.setAttribute('x', minX + 20); totalText.setAttribute('y', ty + 8);
  totalText.setAttribute('font-family', 'Lato, Noto Sans JP, sans-serif');
  totalText.setAttribute('font-size', '14'); totalText.setAttribute('font-weight', '700');
  totalText.setAttribute('fill', '#4a545f');
  totalText.textContent = `合計: \u00A5${total.toLocaleString()}`;
  exportSvg.appendChild(totalText);

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(exportSvg);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = w * 2; canvas.height = h * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url);
    canvas.toBlob((b) => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'arcpath_layout.png';
      a.click();
    });
  };
  img.src = url;
  if (deselected) selectPiece(deselected);
}

// ===============================================
// Save / Load
// ===============================================

function saveLayout() {
  const data = {
    version: 2,
    pieces: state.pieces.map(p => ({
      catIndex: p.catIndex, x: p.x, y: p.y,
      rotation: p.rotation, flip: p.flip,
    })),
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arcpath_layout.json';
  a.click();
}

function loadLayout() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.version !== 1 && data.version !== 2) throw new Error('Unknown version');
        state.pieces = [];
        state.selected = null;
        state.nextId = 1;
        svgEl.querySelector('#pieces-layer').innerHTML = '';
        for (const pd of data.pieces) {
          const piece = addPiece(pd.catIndex, pd.x, pd.y);
          if (piece) {
            piece.rotation = pd.rotation || 0;
            piece.flip = pd.flip || false;
            refreshPieceSVG(piece);
          }
        }
        reconnectAll();
        drawEndpointHandles();
      } catch (err) {
        alert('読み込みエラー: ' + err.message);
      }
    };
    reader.readAsText(file);
  });
  input.click();
}

// ===============================================
// Init
// ===============================================

async function init() {
  try {
    CATALOG = await loadCatalog();
  } catch (e) {
    showError('カタログの読み込みに失敗しました: ' + e.message);
    return;
  }

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  svgEl.appendChild(defs);

  const piecesLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  piecesLayer.id = 'pieces-layer';
  svgEl.appendChild(piecesLayer);

  const endpointOverlay = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  endpointOverlay.id = 'endpoint-overlay';
  svgEl.appendChild(endpointOverlay);

  const overlayLayer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  overlayLayer.id = 'overlay-layer';
  svgEl.appendChild(overlayLayer);

  state.zoom = isMobile() ? 0.8 : 1.2;
  const rect = canvasWrap.getBoundingClientRect();
  state.panX = rect.width / 2;
  state.panY = rect.height / 2;

  buildPalette();
  buildMobileDrawer();
  setupEvents();
  resizeCanvas();
}

init();

})();
</script>
